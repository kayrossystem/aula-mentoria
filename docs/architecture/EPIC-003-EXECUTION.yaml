epic:
  id: EPIC-003
  title: "Developer Experience"
  prioridade: P2
  owner: "@pm (Morgan)"
  status: Backlog
  score_atual: 4.7
  score_meta: 8.0
  prazo: "Sprint 5-6 (semanas 9-12)"
  criado_em: 2026-03-23
  fonte: "Brownfield Discovery Fase 9 — TECHNICAL-DEBT-REPORT.md"
  depende_de: EPIC-001

objetivo_de_negocio: |
  Com a base técnica estabilizada (EPIC-001) e a arquitetura consolidada (EPIC-002),
  este epic ataca problemas de Developer Experience que afetam adoção e crescimento:

  1. Usuários em v4.31 não têm caminho claro de upgrade — fragmenta a base instalada
  2. MCP custom presets são uma funcionalidade invisível — usuários criam workarounds
     manuais para algo que o sistema já resolve
  3. API docs manuais divergem do código — custo de manutenção proibitivo

  Este epic não tem dependência técnica forte do EPIC-002 (pode ser iniciado em
  paralelo após EPIC-001), mas tem menor prioridade de negócio.

gate_de_saida:
  - "docs/migration/v4-to-v5.md publicado com caminho de upgrade completo"
  - "MCP custom presets documentados com exemplos funcionais"
  - "JSDoc em 100% dos arquivos públicos da API core"
  - "Geração automática de API docs via CI/CD"
  - "Score de Documentação de Código >= 7.0"

