  - name: wf-positioning
    file: workflows/wf-positioning.yaml
    description: Posicionamento completo (Bio + CLC + StoryAds + 21 dias)

  - name: wf-21-days
    file: workflows/wf-21-days.yaml
    description: Sistema de dominacao 21 dias

  - name: wf-hook-testing
    file: workflows/wf-hook-testing.yaml
    description: Teste de hooks 70-20-10

  - name: wf-competitor-intel
    file: workflows/wf-competitor-intel.yaml
    description: Pipeline pesquisa de concorrentes BR + US

  - name: wf-atomization
    file: workflows/wf-atomization.yaml
    description: Atomizacao de conteudo longo em pecas curtas

  - name: wf-multiplicar
    file: workflows/wf-multiplicar.yaml
    description: "*multiplicar: 1 conteudo longo → 30+ micro-pecas com qualidade garantida (carrosseis, reels, cortes, stories, frases, briefs de email)"

